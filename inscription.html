<body>

<header>
    <div class="logo">
        <h1>École Fraternité</h1>
        <p>Excellence - Discipline - Réussite</p>

    <nav>
        <ul>

<section>

<h2>Formulaire d'inscription</h2>

<form>

<label>Nom</label>
<input type="text" placeholder="Votre nom" required>

<label>Prénom</label>
<input type="text" placeholder="Votre prénom" required>

<label>Sexe</label>
<select required>
    <option value="">Choisir</option>
    <option>Masculin</option>
    <option>Féminin</option>
</select>

<label>Date de naissance</label>
<input type="date" required>

<label>Classe demandée</label>
<select required>
    <option value="">Choisir une classe</option>

    <optgroup label="Maternelle">
        <option>Petite Section</option>
        <option>Moyenne Section</option>
        <option>Grande Section</option>
    </optgroup>

    <optgroup label="Primaire">
        <option>CI</option>
        <option>CP</option>
        <option>CE1</option>
        <option>CE2</option>
        <option>CM1</option>
        <option>CM2</option>
    </optgroup>

    <optgroup label="Secondaire">
        <option>6e</option>
        <option>5e</option>
        <option>4e</option>
        <option>3e</option>
        <option>Seconde</option>
        <option>Première</option>
        <option>Terminale</option>
    </optgroup>

</select>

<label>Nom du parent ou tuteur</label>
<input type="text" placeholder="Nom du parent" required>

<label>Téléphone</label>
<input type="tel" placeholder="+229 XX XX XX XX" required>

<label>Adresse</label>
<input type="text" placeholder="Votre adresse">

<label>Email</label>
<input type="email" placeholder="exemple@email.com">

<label>Informations complémentaires</label>
<textarea rows="5" placeholder="Votre message..."></textarea>

<button type="submit">Envoyer la demande d'inscription</button>

</form>

</section>

<footer>

<p>

École Fraternité

© 2026 Tous droits réservés

</p>

</footer>

</body>
</html>
